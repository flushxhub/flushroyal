
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>special 19th birthday. 😍</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
}

.card{
    background:#111827;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,.45);
}

.video-frame{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    overflow:hidden;
}

.video-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.video-frame::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    height:35%;
    background:linear-gradient(
        to top,
        rgba(0,0,0,.85),
        transparent
    );
    z-index:1;
}

.play-button{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85px;
    height:85px;
    border-radius:50%;
    background:rgba(0,0,0,.45);
    border:2px solid rgba(255,255,255,.9);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:5;
    transition:.25s;
    backdrop-filter:blur(4px);
}

.play-button::before{
    content:"▶";
    color:#fff;
    font-size:30px;
    margin-left:6px;
}

.video-frame:hover .play-button{
    transform:translate(-50%,-50%) scale(1.08);
}

.controls{
    position:absolute;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    width:88%;
    z-index:5;
}

.progress{
    width:100%;
    height:4px;
    background:rgba(255,255,255,.25);
    border-radius:20px;
    overflow:hidden;
}

.progress::after{
    content:"";
    display:block;
    width:30%;
    height:100%;
    background:#fff;
}

.content{
    padding:24px;
    text-align:center;
}

.content h1{
    color:#fff;
    font-size:30px;
    margin-bottom:10px;
}

.content p{
    color:#cbd5e1;
    font-size:15px;
    line-height:1.6;
}

.video-link{
    text-decoration:none;
}

@media(max-width:768px){

    body{
        padding:12px;
    }

    .video-frame{
        aspect-ratio:9/16;
    }

    .play-button{
        width:70px;
        height:70px;
    }

    .play-button::before{
        font-size:24px;
    }

    .content{
        padding:18px;
    }

    .content h1{
        font-size:24px;
    }

    .content p{
        font-size:14px;
    }

}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <a class="video-link"
           href="https://straightvibez.blogspot.com/2026/06/19th-birthday-very-special-little-cake.html"
           target="_blank"
           rel="noopener noreferrer">

            <div class="video-frame">

                <img
                    src="https://cdn.aceimg.com/eKXxeynxL.jpg"
                    alt="Video Thumbnail"
                    loading="lazy">

                <div class="play-button"></div>

                <div class="controls">
                    <div class="progress"></div>
                </div>

            </div>

        </a>

        <div class="content">
            <h1>special 19th birthday. 😍</h1>
            <p>Watch Video</p>
        </div>

</div>
</div>

</body>
</html>
